<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深海奇遇：拯救发光水母（含听写模式）</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Comic Sans MS', sans-serif; background: radial-gradient(circle at center, #0a2a43 0%, #020813 100%); color: white; display: flex; justify-content: center; align-items: center; }
        .screen { display: none; flex-direction: column; align-items: center; text-align: center; padding: 20px; max-width: 600px; width: 90%; animation: fadeIn 1s ease; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 2.5rem; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; margin-bottom: 10px; color: #e0f7ff; }
        p { font-size: 1.2rem; line-height: 1.6; margin-bottom: 30px; color: #b3e5fc; }
        button { padding: 15px 40px; font-size: 1.5rem; border: none; border-radius: 50px; background: linear-gradient(45deg, #00c6ff, #0072ff); color: white; cursor: pointer; box-shadow: 0 0 15px rgba(0, 198, 255, 0.6); transition: all 0.3s ease; margin: 5px;}
        button:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 198, 255, 0.9); }
        
        /* 第一关翻牌 */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .card { aspect-ratio: 1/1; background: rgba(255,255,255,0.1); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; transition: all 0.3s; border: 2px solid rgba(255,255,255,0.2); user-select: none; }
        .card.flipped, .card.matched { background: rgba(0, 255, 255, 0.2); border-color: #00ffff; }
        .card.shake { animation: shake 0.5s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        /* 第二关连词 */
        .sentence-area { min-height: 60px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-bottom: 20px; width: 100%; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; border: 2px dashed rgba(255,255,255,0.3); }
        .word-bubble { padding: 8px 15px; background: #0072ff; border-radius: 20px; cursor: pointer; margin: 5px; transition: 0.3s; }
        .word-bubble:hover { background: #00c6ff; }
        .word-bubble.used { opacity: 0.3; pointer-events: none; }
        
        /* 第三关对话 */
        .dialogue-options { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .option-btn { background: rgba(255,255,255,0.1); border: 2px solid #00ffff; padding: 15px; border-radius: 15px; font-size: 1.1rem; transition: 0.3s; }
        .option-btn:hover { background: rgba(0, 255, 255, 0.2); }

        /* 新增：听写模式样式 */
        .dictation-box { background: rgba(0,0,0,0.4); padding: 30px; border-radius: 20px; border: 2px solid #00ffff; width: 100%; margin-bottom: 20px;}
        .zh-word { font-size: 3rem; color: #fff; margin-bottom: 10px; text-shadow: 0 0 10px #00ffff;}
        .speaker-btn { font-size: 3rem; cursor: pointer; margin-bottom: 20px; transition: 0.3s;}
        .speaker-btn:hover { transform: scale(1.2); }
        input[type="text"] { width: 80%; padding: 15px; font-size: 1.5rem; border-radius: 10px; border: none; text-align: center; outline: none; margin-bottom: 15px;}
        .status-msg { height: 30px; font-size: 1.2rem; margin-top: 10px;}

        /* 胜利特效 */
        .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; background: radial-gradient(circle, rgba(0,255,255,0.4) 0%, transparent 70%); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- 开始界面 -->
    <div id="start-screen" class="screen active">
        <h1>🌊 深海奇遇</h1>
        <p>调皮的迷雾海怪偷走了发光水母的“能量单词”！<br>勇敢的探险家，请帮它们找回光芒吧！</p>
        <button onclick="startLevel1()">开始冒险 🚀</button>
    </div>

    <!-- 第一关：浅海珊瑚礁 -->
    <div id="level1-screen" class="screen">
        <h2>🐢 浅海珊瑚礁</h2>
        <p>念出咒语，救出被困的小海龟！<br>(配对英文与中文)</p>
        <div id="card-grid" class="grid"></div>
        <p id="l1-status" style="font-size:1.2rem; height:20px;"></p>
    </div>

    <!-- 第二关：沉船迷宫 -->
    <div id="level2-screen" class="screen">
        <h2>🚢 沉船迷宫</h2>
        <p>拼出正确的句子，打开大门！</p>
        <div id="current-sentence" class="sentence-area"></div>
        <div id="word-bank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:20px;"></div>
        <button onclick="checkSentence()" style="padding:10px 30px; font-size:1rem;">确认句子 ✅</button>
        <p id="l2-status" style="margin-top:15px; height:20px;"></p>
    </div>

    <!-- 第三关：深渊水晶洞（已改为听写模式） -->
    <div id="level3-screen" class="screen">
        <h2>👾 迷雾海怪的考验</h2>
        <p>"想拿回能量？先听听我的咒语，把它拼出来！"</p>
        <div class="dictation-box">
            <div class="speaker-btn" onclick="playDictationAudio()">🔊</div>
            <div class="zh-word" id="dictation-zh"></div>
            <input type="text" id="dictation-input" placeholder="在这里输入英文..." autocomplete="off">
            <br>
            <button onclick="checkDictation()" style="padding:10px 30px; font-size:1rem;">提交咒语 ✨</button>
        </div>
        <p id="l3-status" class="status-msg"></p>
    </div>

    <!-- 胜利界面 -->
    <div id="win-screen" class="screen">
        <div class="confetti"></div>
        <h1>🎉 恭喜通关！</h1>
        <p>水母们重新亮起了光芒！<br>你是最棒的深海探险家！🏆</p>
        <button onclick="location.reload()">再玩一次 🔄</button>
    </div>

<script>
    // --- 音效生成器 (无需外部文件) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'click') { osc.frequency.value = 800; gain.gain.value = 0.1; osc.start(); osc.stop(audioCtx.currentTime + 0.05); }
        if (type === 'success') { osc.type = 'sine'; osc.frequency.setValueAtTime(523, audioCtx.currentTime); osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2); gain.gain.value = 0.2; osc.start(); osc.stop(audioCtx.currentTime + 0.4); }
        if (type === 'fail') { osc.type = 'sawtooth'; osc.frequency.value = 200; gain.gain.value = 0.1; osc.start(); osc.stop(audioCtx.currentTime + 0.2); }
        if (type === 'win') { 
            [523, 659, 784, 1047].forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination); o.type='sine'; o.frequency.value=freq; g.gain.value=0.1;
                o.start(audioCtx.currentTime + i*0.15); o.stop(audioCtx.currentTime + i*0.15 + 0.3);
            });
        }
    }

    // --- 浏览器自带语音合成 (TTS) ---
    function speakEnglish(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // 停止之前的发音
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8; // 语速稍微放慢，适合孩子
            window.speechSynthesis.speak(utterance);
        } else {
            alert("当前浏览器不支持语音播放，请使用 Chrome 或 Edge 浏览器哦！");
        }
    }

    // --- 第一关逻辑 (保持不变) ---
    const pairs = [
        {en: "Jellyfish", zh: "水母"}, {en: "Turtle", zh: "海龟"}, 
        {en: "Whale", zh: "鲸鱼"}, {en: "Starfish", zh: "海星"},
        {en: "Coral", zh: "珊瑚"}, {en: "Shark", zh: "鲨鱼"},
        {en: "Dolphin", zh: "海豚"}, {en: "Crab", zh: "螃蟹"}
    ];
    let cards = []; let flippedCards = []; let matchedCount = 0;

    function startLevel1() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('level1-screen').classList.add('active');
        initCards();
    }

    function initCards() {
        const grid = document.getElementById('card-grid');
        grid.innerHTML = ''; cards = []; flippedCards = []; matchedCount = 0;
        pairs.forEach(p => { cards.push({text: p.en, type: 'en'}); cards.push({text: p.zh, type: 'zh'}); });
        cards.sort(() => Math.random() - 0.5);
        cards.forEach((card, idx) => {
            const div = document.createElement('div');
            div.className = 'card'; div.innerText = '?'; div.dataset.idx = idx;
            div.onclick = () => flipCard(div, card, idx);
            grid.appendChild(div);
        });
    }

    function flipCard(el, card, idx) {
        if(flippedCards.length === 2 || el.classList.contains('flipped') || el.classList.contains('matched')) return;
        playSound('click'); el.classList.add('flipped'); el.innerText = card.text;
        flippedCards.push({el, card, idx});
        if(flippedCards.length === 2) checkMatch();
    }

    function checkMatch() {
        const [a, b] = flippedCards;
        const correctPair = pairs.find(p => 
            (p.en === a.card.text && p.zh === b.card.text) || 
            (p.zh === a.card.text && p.en === b.card.text)
        );
        if(correctPair) {
            playSound('success'); a.el.classList.add('matched'); b.el.classList.add('matched');
            matchedCount++;
            if(matchedCount === pairs.length) setTimeout(() => {
                document.getElementById('level1-screen').classList.remove('active');
                document.getElementById('level2-screen').classList.add('active');
                initLevel2();
            }, 800);
        } else {
            playSound('fail'); a.el.classList.add('shake'); b.el.classList.add('shake');
            setTimeout(() => {
                a.el.classList.remove('flipped', 'shake'); a.el.innerText = '?';
                b.el.classList.remove('flipped', 'shake'); b.el.innerText = '?';
            }, 800);
        }
        flippedCards = [];
    }

    // --- 第二关逻辑 (保持不变) ---
    const sentenceData = { words: ["The", "whale", "is", "blue", "."], correct: "The whale is blue ." };
    let currentWords = [];

    function initLevel2() {
        const bank = document.getElementById('word-bank');
        const area = document.getElementById('current-sentence');
        bank.innerHTML = ''; area.innerHTML = ''; currentWords = [];
        document.getElementById('l2-status').innerText = '';
        let shuffled = [...sentenceData.words].sort(() => Math.random() - 0.5);
        shuffled.forEach(w => {
            const btn = document.createElement('div');
            btn.className = 'word-bubble'; btn.innerText = w;
            btn.onclick = () => addWord(btn, w);
            bank.appendChild(btn);
        });
    }

    function addWord(btn, word) {
        playSound('click'); btn.classList.add('used'); currentWords.push(word);
        const span = document.createElement('span');
        span.innerText = word + ' '; span.style.fontSize = '1.2rem';
        document.getElementById('current-sentence').appendChild(span);
    }

    function checkSentence() {
        const formed = currentWords.join(' ');
        if(formed === sentenceData.correct) {
            playSound('success'); document.getElementById('l2-status').innerText = "太棒了！门打开了！";
            setTimeout(() => {
                document.getElementById('level2-screen').classList.remove('active');
                document.getElementById('level3-screen').classList.add('active');
                initDictation(); // 进入听写关卡
            }, 1000);
        } else {
            playSound('fail'); document.getElementById('l2-status').innerText = "顺序不对哦，再试试！";
            setTimeout(() => {
                currentWords = []; document.getElementById('current-sentence').innerHTML = '';
                document.querySelectorAll('.word-bubble').forEach(b => b.classList.remove('used'));
            }, 800);
        }
    }

    // --- 新增：第三关 听写模式逻辑 ---
    const dictationWords = [
        {en: "jellyfish", zh: "水母"}, {en: "turtle", zh: "海龟"}, 
        {en: "whale", zh: "鲸鱼"}, {en: "starfish", zh: "海星"}
    ];
    let currentDictationIndex = 0;

    function initDictation() {
        currentDictationIndex = 0;
        loadDictationWord();
    }

    function loadDictationWord() {
        if (currentDictationIndex >= dictationWords.length) {
            // 全部听写完成，通关！
            playSound('win');
            document.getElementById('level3-screen').classList.remove('active');
            document.getElementById('win-screen').classList.add('active');
            return;
        }
        const word = dictationWords[currentDictationIndex];
        document.getElementById('dictation-zh').innerText = word.zh;
        document.getElementById('dictation-input').value = '';
        document.getElementById('l3-status').innerText = `进度：${currentDictationIndex + 1} / ${dictationWords.length}`;
        document.getElementById('dictation-input').focus();
        
        // 自动播放一次发音
        setTimeout(() => speakEnglish(word.en), 500);
    }

    function playDictationAudio() {
        const word = dictationWords[currentDictationIndex];
        speakEnglish(word.en);
    }

    function checkDictation() {
        const input = document.getElementById('dictation-input').value.trim().toLowerCase();
        const correct = dictationWords[currentDictationIndex].en.toLowerCase();
        
        if (input === correct) {
            playSound('success');
            document.getElementById('l3-status').innerText = "✨ 咒语正确！能量+1";
            currentDictationIndex++;
            setTimeout(loadDictationWord, 1000);
        } else {
            playSound('fail');
            document.getElementById('l3-status').innerText = "😢 拼错啦，再听一次试试！";
            document.getElementById('dictation-input').value = '';
            document.getElementById('dictation-input').focus();
        }
    }

    // 支持按回车键提交听写
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.getElementById('level3-screen').classList.contains('active')) {
            checkDictation();
        }
    });
</script>
</body>
</html>
